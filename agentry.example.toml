# agentry.example.toml — copy to `~/.config/agentry/agentry.toml` and edit.
# Loaded by figment at binary startup. Env vars prefixed `AGENTRY_` with `__`
# nesting (e.g. `AGENTRY_REDIS__URL`) override anything below.

[redis]
# LOCAL podman Redis only. NEVER the prod LXCs (.152 / .189).
# In dev, the justfile composes this URL from ~/.config/agentry/redis.password
# at each `just ...` invocation — you usually don't need to set this file.
url = "redis://:PASSWORD@127.0.0.1:6380"

[dashboard]
# HTTP port for the Axum dashboard (read-only + form editor).
port = 7800

[signing]
# ed25519 secret key, hex-encoded 32 bytes, 0600 perms. Created by
# `orchestrator key-gen`. Keep off git forever.
key_path = "/home/YOU/.config/agentry/signing.key"

[webhook]
# Optional shared secret for POST /submit. If unset, the webhook is
# disabled (every call returns 401). Also settable via env:
# AGENTRY_WEBHOOK__SECRET=<random-hex>.
# secret = "replace-with-openssl-rand-hex-16"

[forge]
# Default forge host used when a brief's payload does not set forge_host.
# Format: "host:port" (no scheme). Combined with brief.payload.target_repo
# to construct a https://oauth2:${GITEA_TOKEN}@<host>/<owner>/<repo>.git URL.
# Required for brief dispatch unless every brief sets forge_host explicitly.
# default_host = "agency.lab:3000"
# Bare forge owner names this team is allowed to push to / open PRs on.
# seed.rs expands each entry to a `forge:write:<owner>/*` permit on the
# shipper / pr-rebaser roles. Empty list rejects all forge writes.
# allowed_owners = ["yg"]

[sccache]
# Network alias or DNS name (with optional ":port") of the shared
# sccache-redis backend. seed.rs strips any port and expands this to a
# `net:allow:<host>` permit on roles that compile Rust, plus flips
# their `sccache: true` flag. Unset = roles run without sccache.
# endpoint = "agentry-sccache-redis:6379"
